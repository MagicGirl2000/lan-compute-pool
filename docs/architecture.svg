<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="boss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ea1ff"/><stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8295ad"/>
    </marker>
  </defs>

  <rect width="860" height="430" fill="#0d1118"/>
  <text x="430" y="34" fill="#dfe6f2" font-size="20" font-weight="bold" text-anchor="middle">LAN Compute Pool · 局域网算力共享池</text>
  <rect x="24" y="54" width="812" height="350" rx="12" fill="none" stroke="#2a3344" stroke-dasharray="6 5"/>
  <text x="44" y="78" fill="#8295ad" font-size="13">局域网 LAN（同一 WiFi / 路由器）</text>

  <!-- Android worker -->
  <rect x="56" y="110" width="220" height="120" rx="10" fill="#161c28" stroke="#2a3344"/>
  <text x="166" y="140" fill="#42d392" font-size="15" font-weight="bold" text-anchor="middle">📱 worker-android</text>
  <text x="166" y="164" fill="#dfe6f2" font-size="12" text-anchor="middle">安卓工人 (Kotlin)</text>
  <text x="166" y="186" fill="#8295ad" font-size="11" text-anchor="middle">读资源→过阈值→拉任务</text>
  <text x="166" y="204" fill="#8295ad" font-size="11" text-anchor="middle">→ 跑任务 → 交结果</text>

  <!-- Coordinator -->
  <rect x="330" y="96" width="240" height="96" rx="10" fill="#161c28" stroke="#4ea1ff"/>
  <text x="450" y="126" fill="#4ea1ff" font-size="15" font-weight="bold" text-anchor="middle">⚙ coordinator :9000</text>
  <text x="450" y="150" fill="#dfe6f2" font-size="12" text-anchor="middle">协调端（中枢）</text>
  <text x="450" y="170" fill="#8295ad" font-size="11" text-anchor="middle">队列 · 心跳 · 安全阈值 · 计费 · 看板</text>

  <!-- Boss -->
  <rect x="330" y="250" width="420" height="130" rx="10" fill="#161c28" stroke="url(#boss)"/>
  <rect x="330" y="250" width="420" height="130" rx="10" fill="none" stroke="url(#boss)" stroke-width="2"/>
  <text x="540" y="280" fill="#7c5cff" font-size="15" font-weight="bold" text-anchor="middle">🧠 boss :8000  算力老板</text>
  <text x="540" y="304" fill="#dfe6f2" font-size="12" text-anchor="middle">评估算力比例 · 按比例切分 · 派发 · 合并 · 可视化(Web/桌面)</text>
  <rect x="352" y="320" width="180" height="44" rx="8" fill="#1d2533" stroke="#2a3344"/>
  <text x="442" y="340" fill="#dfe6f2" font-size="11" text-anchor="middle">手机那份 → 投协调端队列</text>
  <text x="442" y="356" fill="#8295ad" font-size="10" text-anchor="middle">phone share → coordinator</text>
  <rect x="548" y="320" width="184" height="44" rx="8" fill="#1d2533" stroke="#2a3344"/>
  <text x="640" y="340" fill="#dfe6f2" font-size="11" text-anchor="middle">电脑那份 → 本地引擎</text>
  <text x="640" y="356" fill="#8295ad" font-size="10" text-anchor="middle">PC share → multi-core / GPU</text>

  <!-- PC label -->
  <text x="690" y="120" fill="#8295ad" font-size="12">💻 PC（协调端 + 老板都在此）</text>

  <!-- arrows -->
  <line x1="276" y1="150" x2="326" y2="144" stroke="#8295ad" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="300" y="135" fill="#8295ad" font-size="10" text-anchor="middle">HTTP</text>
  <line x1="450" y1="192" x2="450" y2="248" stroke="#8295ad" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="486" y="224" fill="#8295ad" font-size="10" text-anchor="middle">读状态/提交</text>
</svg>
